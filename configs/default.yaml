# Siamese Cryo-EM 默认训练配置
# 冒烟测试用: 128x128 图像, ConvNeXt-Tiny, batch_size=64

# --- 数据 ---
data_dir: "data"
image_size: 128
train_split: 0.7
val_split: 0.15

# --- 模型 ---
backbone: "convnext_tiny"
embedding_dim: 128
real_in_channels: 1
freq_in_channels: 2
convnext_depths: [3, 3, 9, 3]
convnext_dims: [96, 192, 384, 768]

# --- 训练 ---
batch_size: 64
num_epochs: 200
learning_rate: 0.0001
weight_decay: 0.0001
temperature: 0.07

# scheduler
scheduler_t0: 50
scheduler_t_mult: 2
scheduler_eta_min: 0.000001

# --- 系统 ---
device: "cuda"
num_workers: 4
seed: 42
mixed_precision: false
checkpoint_dir: "checkpoints"
log_interval: 10